<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員後台 | 玄封電競</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0050; --gold: #ffaa00; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02)); background-size: 100% 3px, 3px 100%; z-index: 10; pointer-events: none; }
        .container { width: 90%; max-width: 600px; margin: 0 auto; padding: 20px; z-index: 20; }
        
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #111; padding: 40px; border: 2px solid var(--cyan); clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); text-align: center; width: 90%; max-width: 350px; }
        .login-box h2 { color: var(--cyan); margin-bottom: 25px; font-style: italic; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; outline: none; font-family: inherit; }
        .login-box button { width: 100%; padding: 12px; background: var(--cyan); color: #000; font-weight: 900; border: none; cursor: pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }
        
        .admin-content { display: none; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-size: 12px; }
        .back-link:hover { color: var(--cyan); }
        
        h1 { font-size: 28px; margin: 20px 0; font-style: italic; background: linear-gradient(180deg, var(--gold) 40%, #777 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .section { background: #111; padding: 25px; margin-bottom: 20px; border: 1px solid #333; }
        .section h2 { color: var(--gold); font-size: 16px; margin: 0 0 15px 0; font-style: italic; }
        
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .form-group { flex: 1; margin-bottom: 12px; }
        .form-group label { display: block; color: #888; font-size: 11px; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; outline: none; font-family: inherit; }
        .form-group input:focus { border-color: var(--gold); }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        button { padding: 12px 20px; border: none; cursor: pointer; font-weight: 900; font-family: inherit; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }
        .btn-save { background: var(--gold); color: #000; flex: 1; }
        .btn-clear { background: #444; color: #fff; }
        .btn-edit { background: #00aaff; color: #fff; padding: 8px 12px; font-size: 12px; }
        .btn-delete { background: #ff4444; color: #fff; padding: 8px 12px; font-size: 12px; }
        
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .player-item:last-child { border-bottom: none; }
        .player-info { flex: 1; }
        .player-name { font-weight: bold; color: #fff; font-size: 16px; }
        .link-preview { color: #666; font-size: 12px; word-break: break-all; margin-top: 5px; }
        
        .logout-btn { position: fixed; top: 15px; right: 15px; background: #ff4444; color: #fff; padding: 10px 20px; font-size: 12px; }
        
        .empty-state { color: #444; padding: 30px; text-align: center; }
        
        .info-msg { color: #666; font-size: 11px; margin-top: 20px; text-align: center; }
        .success-msg { color: var(--cyan); font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>ADMIN ACCESS</h2>
            <input type="password" id="password" placeholder="請輸入管理密碼">
            <button onclick="login()">登入系統</button>
            <p style="margin-top: 15px; color: #444; font-size: 11px;">預設密碼: @8888</p>
        </div>
    </div>

    <div class="admin-content" id="adminContent">
        <a href="index.html" class="back-link">← 返回首頁</a>
        <button class="logout-btn" onclick="logout()">登出</button>

        <div class="container">
            <h1>COMMAND CENTER</h1>

            <div class="section">
                <h2>社群連結設定</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>TikTok 網址</label>
                        <input type="url" id="link-tiktok" placeholder="https://tiktok.com/...">
                    </div>
                    <div class="form-group">
                        <label>LINE 網址</label>
                        <input type="url" id="link-line" placeholder="https://line.me/...">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>YouTube 網址</label>
                        <input type="url" id="link-youtube" placeholder="https://youtube.com/...">
                    </div>
                    <div class="form-group">
                        <label>Discord 網址</label>
                        <input type="url" id="link-discord" placeholder="https://discord.gg/...">
                    </div>
                </div>
                <button class="btn-save" onclick="saveLinks()">儲存連結</button>
                <div id="links-success" class="success-msg">儲存成功！</div>
            </div>

            <div class="section">
                <h2>打手管理 (免費服務)</h2>
                <input type="hidden" id="player-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>打手代號</label>
                        <input type="text" id="player-name" placeholder="輸入打手名稱">
                    </div>
                    <div class="form-group">
                        <label>私訊連結</label>
                        <input type="url" id="player-url" placeholder="https://...">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn-save" onclick="savePlayer()">儲存打手</button>
                    <button class="btn-clear" onclick="clearForm()">清除</button>
                </div>
                <div id="player-success" class="success-msg">儲存成功！</div>
            </div>

            <div class="section">
                <h2>打手列表</h2>
                <div id="playerList"></div>
            </div>

            <p class="info-msg">資料自動同步 | 每5秒自動更新</p>
        </div>
    </div>

    <script>
        // ===== GitHub Gist 設定 =====
        const GITHUB_TOKEN = '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';
        const GIST_ID = 'eaae35bcc1b7cede5f4d7238a2eee13d';
        const STORAGE_KEY = 'xf_esports_local';

        const ADMIN_PW = '@8888';

        async function fetchFromGist() {
            if (!GITHUB_TOKEN || GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') {
                return getLocalData();
            }
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const gist = await response.json();
                const content = gist.files['gistfile1.txt']?.content;
                if (content) return JSON.parse(content);
            } catch (e) {
                console.log('Gist 讀取失敗');
            }
            return getLocalData();
        }

        async function saveToGist(data) {
            if (!GITHUB_TOKEN || GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') {
                saveLocalData(data);
                return;
            }
            try {
                const content = JSON.stringify(data);
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { 'gistfile1.txt': { content } }
                    })
                });
            } catch (e) {
                saveLocalData(data);
            }
        }

        function getLocalData() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) return JSON.parse(data);
            return { links: { tiktok: '', line: '', youtube: '', discord: '' }, players: [] };
        }

        function saveLocalData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function login() {
            const pw = document.getElementById('password').value;
            if (pw === ADMIN_PW) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
                startAutoRefresh();
            } else {
                alert('ACCESS DENIED');
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('password').value = '';
        }

        async function loadData() {
            const data = await fetchFromGist();
            document.getElementById('link-tiktok').value = data.links.tiktok || '';
            document.getElementById('link-line').value = data.links.line || '';
            document.getElementById('link-youtube').value = data.links.youtube || '';
            document.getElementById('link-discord').value = data.links.discord || '';
            renderPlayers(data.players || []);
        }

        async function saveLinks() {
            const data = await fetchFromGist();
            data.links = {
                tiktok: document.getElementById('link-tiktok').value,
                line: document.getElementById('link-line').value,
                youtube: document.getElementById('link-youtube').value,
                discord: document.getElementById('link-discord').value
            };
            await saveToGist(data);
            showSuccess('links-success');
        }

        async function savePlayer() {
            const id = document.getElementById('player-id').value;
            const name = document.getElementById('player-name').value.trim();
            const url = document.getElementById('player-url').value.trim();

            if (!name || !url) {
                alert('請填寫打手代號和連結！');
                return;
            }

            const data = await fetchFromGist();

            if (id) {
                const idx = data.players.findIndex(p => p.id == id);
                if (idx !== -1) data.players[idx] = { id: parseInt(id), name, url };
            } else {
                data.players.push({ id: Date.now(), name, url });
            }

            await saveToGist(data);
            clearForm();
            renderPlayers(data.players);
            showSuccess('player-success');
        }

        function editPlayer(id) {
            fetchFromGist().then(data => {
                const player = data.players.find(p => p.id == id);
                if (player) {
                    document.getElementById('player-id').value = player.id;
                    document.getElementById('player-name').value = player.name;
                    document.getElementById('player-url').value = player.url;
                }
            });
        }

        async function deletePlayer(id) {
            if (!confirm('確定要刪除此打手？')) return;
            const data = await fetchFromGist();
            data.players = data.players.filter(p => p.id != id);
            await saveToGist(data);
            renderPlayers(data.players);
        }

        function clearForm() {
            document.getElementById('player-id').value = '';
            document.getElementById('player-name').value = '';
            document.getElementById('player-url').value = '';
        }

        function renderPlayers(players) {
            const list = document.getElementById('playerList');
            if (!players.length) {
                list.innerHTML = '<div class="empty-state">尚未新增任何打手</div>';
                return;
            }
            list.innerHTML = players.map(p => `
                <div class="player-item">
                    <div class="player-info">
                        <div class="player-name">${p.name}</div>
                        <div class="link-preview">${p.url}</div>
                    </div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn-edit" onclick="editPlayer(${p.id})">編輯</button>
                        <button class="btn-delete" onclick="deletePlayer(${p.id})">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        function showSuccess(id) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        let refreshInterval;
        function startAutoRefresh() {
            refreshInterval = setInterval(loadData, 5000);
        }
    </script>
</body>
</html>
