<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄封電競 | XUAN FENG ESPORTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0050; --gold: #ffaa00; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', 'Noto Sans TC', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02)); background-size: 100% 3px, 3px 100%; z-index: 10; pointer-events: none; }
        .container { width: 90%; max-width: 400px; z-index: 20; text-align: center; }
        .logo-area { margin-bottom: 40px; }
        .logo-area h1 { font-size: 40px; margin: 0; font-weight: 900; font-style: italic; background: linear-gradient(180deg, #fff 40%, #777 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.4)); }
        .btn { position: relative; text-decoration: none; padding: 18px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-size: 18px; font-weight: 900; clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%); transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn:hover { transform: scale(1.05) skewX(-2deg); background: rgba(255, 255, 255, 0.1); border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .btn-tiktok { border-left: 6px solid var(--pink); }
        .btn-players { border-left: 6px solid var(--gold); color: var(--gold); }
        #player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; backdrop-filter: blur(10px); justify-content: center; align-items: center; }
        .modal-content { width: 85%; max-width: 350px; border: 2px solid var(--gold); padding: 25px; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); background: #111; }
        .admin-panel { display: none; background: rgba(255, 170, 0, 0.1); padding: 15px; margin-bottom: 15px; border: 1px dashed var(--gold); }
        .admin-panel input { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; border: none; outline: none; }
        .admin-panel button { width: 100%; padding: 10px; background: var(--gold); color: #000; font-weight: 900; border: none; cursor: pointer; margin-bottom: 5px; }
        .admin-panel .btn-row { display: flex; gap: 5px; }
        .admin-panel .btn-row button { flex: 1; }
        .admin-panel .btn-cancel { background: #444; }
        .player-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; align-items: center; }
        .player-item a { color: var(--gold); text-decoration: none; font-weight: bold; }
        .player-item a:hover { color: var(--cyan); }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .admin-trigger { margin-top: 50px; font-size: 8px; color: #151515; cursor: pointer; letter-spacing: 2px; }
        .empty-msg { color: #444; padding: 20px; }
        .loading { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <h1>玄封電競</h1>
            <div style="background:var(--cyan); color:#000; display:inline-block; padding:2px 12px; font-size:12px; font-weight:900; transform:skewX(-15deg);">免費服務</div>
        </div>

        <div class="menu-list">
            <a href="#" id="btn-tiktok" class="btn btn-tiktok" target="_blank">TIKTOK 頻道</a>
            <div class="btn btn-players" onclick="openModal()">頂尖打手名錄</div>
            <a href="#" id="btn-line" class="btn" style="border-left: 6px solid #00b900;">LINE 官方客服</a>
            <a href="#" id="btn-youtube" class="btn" style="border-left: 6px solid #ff0000;">YOUTUBE 賽事</a>
        </div>

        <div class="admin-trigger" onclick="goToAdmin()">AUTH_SYSTEM_ACCESS</div>
    </div>

    <div id="player-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color:var(--gold); margin:0; font-style:italic;">ELITE PLAYERS</h2>
            
            <div id="admin-panel" class="admin-panel">
                <input type="hidden" id="p-id">
                <input type="text" id="p-name" placeholder="打手代號">
                <input type="text" id="p-url" placeholder="私訊連結">
                <div class="btn-row">
                    <button id="submit-btn" onclick="savePlayer()">確認發布</button>
                    <button class="btn-cancel" onclick="clearForm()">清除</button>
                </div>
            </div>

            <div id="player-list" style="max-height: 300px; overflow-y: auto; text-align: left; margin: 15px 0;">
                <div class="loading">連線中...</div>
            </div>
            
            <div style="color:#ff4444; font-weight:bold; cursor:pointer;" onclick="closeModal()">[ 離開 ]</div>
        </div>
    </div>

    <script>
        // ===== GitHub Gist 設定 =====
        // 請填入你的 GitHub Personal Access Token
        // 建立: https://github.com/settings/tokens
        // 權限: gist (write)
        const GITHUB_TOKEN = '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';
        const GIST_ID = 'eaae35bcc1b7cede5f4d7238a2eee13d';
        
        const STORAGE_KEY = 'xf_esports_local';
        let isAdmin = false;
        let cachedData = null;

        async function fetchFromGist() {
            if (!GITHUB_TOKEN || GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') {
                return getLocalData();
            }
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const gist = await response.json();
                const content = gist.files['gistfile1.txt']?.content;
                if (content) {
                    cachedData = JSON.parse(content);
                    return cachedData;
                }
            } catch (e) {
                console.log('Gist 讀取失敗，使用本地資料');
            }
            return getLocalData();
        }

        async function saveToGist(data) {
            if (!GITHUB_TOKEN || GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') {
                saveLocalData(data);
                return;
            }
            try {
                const content = JSON.stringify(data);
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { 'gistfile1.txt': { content } }
                    })
                });
                cachedData = data;
            } catch (e) {
                console.log('Gist 儲存失敗，使用本地儲存');
                saveLocalData(data);
            }
        }

        function getLocalData() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) return JSON.parse(data);
            return {
                links: { tiktok: 'https://www.tiktok.com/@xuenfeng_xu666_?_r=1', line: 'https://lin.ee/rTNT2B6', youtube: 'https://youtube.com/@xfg-mtd', discord: 'https://discord.gg/vCcFpKuzR' },
                players: []
            };
        }

        function saveLocalData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function initLinks() {
            fetchFromGist().then(data => {
                const links = data.links;
                document.getElementById('btn-tiktok').href = links.tiktok || '#';
                document.getElementById('btn-line').href = links.line || '#';
                document.getElementById('btn-youtube').href = links.youtube || '#';
                document.getElementById('btn-discord').href = links.discord || '#';
            });
        }

        function fetchPlayers() {
            fetchFromGist().then(data => {
                renderPlayers(data.players || []);
            });
        }

        function goToAdmin() {
            window.location.href = 'admin.html';
        }

        async function savePlayer() {
            const id = document.getElementById('p-id').value;
            const name = document.getElementById('p-name').value.trim();
            const url = document.getElementById('p-url').value.trim();
            
            if (!name || !url) return alert("請輸入完整資料");

            const data = await fetchFromGist();
            
            if (id) {
                const idx = data.players.findIndex(p => p.id == id);
                if (idx !== -1) data.players[idx] = { ...data.players[idx], name, url };
            } else {
                data.players.push({ id: Date.now(), name, url });
            }
            
            await saveToGist(data);
            clearForm();
            renderPlayers(data.players);
            alert(id ? "更新成功！" : "同步成功！");
        }

        function editPlayer(id) {
            fetchFromGist().then(data => {
                const player = data.players.find(p => p.id == id);
                if (player) {
                    document.getElementById('p-id').value = player.id;
                    document.getElementById('p-name').value = player.name;
                    document.getElementById('p-url').value = player.url;
                    document.getElementById('submit-btn').innerText = '更新資料';
                }
            });
        }

        async function deletePlayer(id) {
            if (!confirm("確定要刪除？")) return;
            const data = await fetchFromGist();
            data.players = data.players.filter(p => p.id != id);
            await saveToGist(data);
            renderPlayers(data.players);
        }

        function clearForm() {
            document.getElementById('p-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-url').value = '';
            document.getElementById('submit-btn').innerText = '確認發布';
        }

        function renderPlayers(players) {
            const listDiv = document.getElementById('player-list');
            if (!players.length) {
                listDiv.innerHTML = '<div class="empty-msg">暫無名單</div>';
                return;
            }
            listDiv.innerHTML = players.map(p => `
                <div class="player-item">
                    <a href="${p.url}" target="_blank">${p.name}</a>
                    ${isAdmin ? `
                        <div>
                            <button class="del-btn" style="background:#00aaff;" onclick="editPlayer(${p.id})">編輯</button>
                            <button class="del-btn" onclick="deletePlayer(${p.id})">X</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function openModal() { 
            document.getElementById('player-modal').style.display = 'flex'; 
            fetchPlayers();
        }
        function closeModal() { 
            document.getElementById('player-modal').style.display = 'none'; 
            clearForm();
        }

        setInterval(() => {
            if(document.getElementById('player-modal').style.display === 'flex') {
                fetchPlayers();
            }
        }, 5000);

        initLinks();
    </script>
</body>
</html>
